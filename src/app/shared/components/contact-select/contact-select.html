<div class="contact-select" [class.contact-select--open]="open()" [class.contact-select--disabled]="disabled()">
  <button
    type="button"
    class="contact-select__trigger"
    [id]="id"
    [attr.aria-labelledby]="triggerLabelledBy"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="listboxId"
    [attr.aria-activedescendant]="open() && activeIndex() >= 0 ? optionId(activeIndex()) : null"
    aria-haspopup="listbox"
    [disabled]="disabled()"
    (click)="toggle()"
    (keydown)="onTriggerKeydown($event)"
  >
    <span
      class="contact-select__value"
      [id]="valueLabelId"
      [class.contact-select__value--placeholder]="!value()"
    >
      @if (selectedOption; as option) {
        {{ option.labelKey | translate }}
      } @else {
        {{ placeholderKey | translate }}
      }
    </span>
    <span class="contact-select__chevron" aria-hidden="true">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M4 6L8 10L12 6"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>
  </button>

  @if (open()) {
    <ul
      class="contact-select__panel"
      role="listbox"
      [id]="listboxId"
      [attr.aria-labelledby]="id"
    >
      @for (option of options; track option.id; let i = $index) {
        <li
          role="option"
          class="contact-select__option"
          [id]="optionId(i)"
          [class.contact-select__option--active]="activeIndex() === i"
          [class.contact-select__option--selected]="value() === option.id"
          [attr.aria-selected]="value() === option.id"
          (click)="selectOption(option)"
          (mouseenter)="activeIndex.set(i)"
        >
          <span class="contact-select__option-label">{{ option.labelKey | translate }}</span>
          <span class="contact-select__option-description">{{ option.descriptionKey | translate }}</span>
        </li>
      }
    </ul>
  }
</div>
