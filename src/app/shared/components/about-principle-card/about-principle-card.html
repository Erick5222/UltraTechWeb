<article class="about-principle-card">
  <div class="about-principle-card__icon-wrap">
    <img [src]="icon" [alt]="titleKey | translate" class="about-principle-card__icon" loading="lazy" />
  </div>

  <h3 class="about-principle-card__title">{{ titleKey | translate }}</h3>
  <p class="about-principle-card__description">{{ descriptionKey | translate }}</p>
</article>
