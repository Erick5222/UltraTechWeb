<div
  class="fleet-dashboard"
  [class.fleet-dashboard--with-details]="selectedUnitId() !== null"
>
  @if (error(); as message) {
    <div class="fleet-dashboard__error" role="alert">
      <p>{{ message }}</p>
      <button type="button" (click)="onRetry()">Retry</button>
    </div>
  }

  @if (loading()) {
    <div class="fleet-dashboard__loading" aria-live="polite">
      <p>Loading dashboard...</p>
    </div>
  }

  @if (selectedUnitId() === null) {
    <div class="fleet-dashboard__hint" role="status">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5z" fill="currentColor"/>
      </svg>
      <span>
        Interactive demo — click any truck on the map or select a unit from the list to view live telemetry.
      </span>
    </div>
  }

  <div class="fleet-dashboard__map">
    <app-map-panel />
  </div>
  <div class="fleet-dashboard__units">
    <app-units-list />
  </div>
  @if (selectedUnitId() !== null) {
    <div class="fleet-dashboard__details">
      <app-unit-details />
    </div>
  }
</div>
