@if (selectedUnit(); as unit) {
  <aside class="unit-details">
    <div class="unit-details__header">
      <div class="unit-details__title-group">
        <h2 class="unit-details__title">Unit {{ unit.code }}</h2>
        <app-status-pill [label]="statusLabel()" [variant]="statusVariant()" size="md" />
      </div>
      <!-- <button class="unit-details__link" aria-label="Open full detail" type="button">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z" fill="currentColor"/>
        </svg>
      </button> -->
    </div>

    <div class="unit-details__body">
      <section class="unit-details__section">
        <app-telemetry-panel />
      </section>

      @if (trailers().length > 0) {
        <section class="unit-details__section">
          <app-trailer-list [trailers]="trailers()" />
        </section>
      }

      <section class="unit-details__section">
        <app-alert-panel [alerts]="alerts()" />
      </section>
    </div>

    <div class="unit-details__actions">
    </div>
  </aside>
}
