<div class="fuel-chart">
  <div class="fuel-chart__header">
    <div class="fuel-chart__title-group">
      <span class="fuel-chart__label">Fuel (24h)</span>
      <span class="fuel-chart__value">{{ currentFuel() | number: '1.0-0' }}%</span>
    </div>
  </div>

  @if (chartOptions(); as options) {
    <apx-chart
      [series]="options.series"
      [chart]="options.chart"
      [xaxis]="options.xaxis"
      [yaxis]="options.yaxis"
      [stroke]="options.stroke"
      [markers]="options.markers"
      [tooltip]="options.tooltip"
      [dataLabels]="options.dataLabels"
      [colors]="options.colors"
    />
  } @else {
    <p class="fuel-chart__empty">No fuel history available.</p>
  }
</div>
