<article class="showcase-placeholder">
  <header class="showcase-placeholder__intro">
    <p class="showcase-placeholder__label">{{ 'caseStudy.showcase.comingSoonLabel' | translate }}</p>
    <h2 class="showcase-placeholder__title">{{ content().titleKey | translate }}</h2>
    <p class="showcase-placeholder__subtitle">{{ content().subtitleKey | translate }}</p>
  </header>

  <div class="showcase-placeholder__stage" aria-hidden="true">
    <div class="showcase-placeholder__frame">
      <div class="showcase-placeholder__glow"></div>
    </div>
  </div>
</article>
