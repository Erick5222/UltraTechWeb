<section class="about-hero" [class.about-hero--embedded]="embedded">
  <div class="about-hero__glow" aria-hidden="true"></div>

  <div class="about-hero__container">
    <h2 class="about-hero__title">
      {{ 'aboutPage.hero.titlePrefix' | translate }}
      <span>{{ 'aboutPage.hero.titleHighlight' | translate }}</span>
    </h2>

    <p class="about-hero__subtitle">{{ 'aboutPage.hero.subtitle' | translate }}</p>

    <p class="about-hero__closing">{{ 'aboutPage.hero.closing' | translate }}</p>
  </div>
</section>
