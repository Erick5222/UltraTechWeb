<footer class="footer">
  <div class="footer__container">
    <div class="footer__top">
      <div class="footer__brand-block">
        <p class="footer__brand">Ultra <span>Tech</span></p>
        <p class="footer__tagline">{{ 'footer.tagline' | translate }}</p>
      </div>

      <div class="footer__column"></div>
      <div class="footer__column">
        <h2 class="footer__heading">{{ 'footer.socialHeading' | translate }}</h2>
        <ul class="footer__list">
          @for (link of socialLinks; track link.labelKey) {
            <li>
              <a
                [href]="link.href"
                class="footer__link"
                [attr.target]="link.external ? '_blank' : null"
                [attr.rel]="link.external ? 'noopener noreferrer' : null"
              >
                {{ link.labelKey | translate }}
              </a>
            </li>
          }
        </ul>
      </div>

      <!-- <div class="footer__column">
        <h2 class="footer__heading">{{ 'footer.linksHeading' | translate }}</h2>
        <ul class="footer__list">
          @for (link of generalLinks; track link.labelKey) {
            <li>
              <a [href]="link.href" class="footer__link">{{ link.labelKey | translate }}</a>
            </li>
          }
        </ul>
      </div> -->
    </div>

    <p class="footer__copyright">{{ 'footer.copyright' | translate }}</p>
  </div>
</footer>
